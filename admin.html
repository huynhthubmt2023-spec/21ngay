<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Content Mastery</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #eab308; --bg: #0a0a0a; --card: #141414; --border: #262626; --text: #e5e5e5; }
        * { margin:0; padding:0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 40px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .logo { font-weight: 800; font-size: 1.5rem; letter-spacing: -1px; }
        .logo span { color: var(--neon); }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .tab { padding: 10px 20px; cursor: pointer; border-radius: 8px; font-weight: 600; color: #737373; transition: 0.3s; }
        .tab.active { background: var(--border); color: var(--neon); }
        .content-section { display: none; }
        .content-section.active { display: block; }
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 12px; overflow: hidden; }
        table th { background: #1a1a1a; padding: 15px; text-align: left; font-size: 0.85rem; color: #737373; text-transform: uppercase; }
        table td { padding: 15px; border-bottom: 1px solid var(--border); }
        .btn { padding: 8px 16px; border-radius: 6px; cursor: pointer; border: none; font-weight: 600; font-size: 0.85rem; }
        .btn-add { background: var(--neon); color: #000; margin-bottom: 20px; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: 600; }
        .badge-success { background: #dcfce7; color: #166534; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">ADMIN <span>PANEL</span></div>
        <div style="font-size: 0.9rem; color: #737373;">Hệ thống quản lý 21 Ngày (Live Data)</div>
    </div>
    <div class="tabs">
        <div class="tab active" onclick="showTab('products', event)">Sản phẩm</div>
        <div class="tab" onclick="showTab('customers', event)">Khách hàng</div>
        <div class="tab" onclick="showTab('orders', event)">Đơn hàng</div>
    </div>
    <div id="products" class="content-section active">
        <button class="btn btn-add">+ Thêm sản phẩm</button>
        <table>
            <thead><tr><th>ID</th><th>Tên sản phẩm</th><th>Giá</th><th>Kho</th></tr></thead>
            <tbody id="product-list"></tbody>
        </table>
    </div>
    <div id="customers" class="content-section">
        <button class="btn btn-add">+ Thêm khách hàng</button>
        <table>
            <thead><tr><th>ID</th><th>Họ tên</th><th>Số điện thoại</th><th>Ngày đăng ký</th></tr></thead>
            <tbody id="customer-list"></tbody>
        </table>
    </div>
    <div id="orders" class="content-section">
        <button class="btn btn-add">+ Tạo đơn hàng mới</button>
        <table>
            <thead><tr><th>ID</th><th>Khách hàng</th><th>Sản phẩm</th><th>Số tiền</th><th>Trạng thái</th><th>Ngày mua</th></tr></thead>
            <tbody id="order-list"></tbody>
        </table>
    </div>
    <script>
        function showTab(tabId, event) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tabId).classList.add('active');
        }
        
        const mockData = {
            products: [{ id: 1, name: "Thử Thách 21 Ngày Biến Nội Dung Thành Tiền", price: 1980000, stock: 98 }],
            customers: [
                { id: 101, name: "Quốc Minh", phone: "09x xxx xxxx", registered_at: "2024-04-11" },
                { id: 102, name: "Nguyễn Văn A", phone: "0901234567", registered_at: "2024-04-10" }
            ],
            orders: [
                { id: 5001, customer_name: "Quốc Minh", product_name: "Thử Thách 21 Ngày", amount: 1980000, status: "Đã thanh toán", date: "2024-04-11 22:45" },
                { id: 5002, customer_name: "Nguyên Văn A", product_name: "Thử Thách 21 Ngày", amount: 1980000, status: "Đã thanh toán", date: "2024-04-10 14:20" }
            ]
        };

        document.getElementById('product-list').innerHTML = mockData.products.map(p => `<tr><td>#${p.id}</td><td>${p.name}</td><td>${p.price.toLocaleString()}đ</td><td>${p.stock}</td></tr>`).join('');
        document.getElementById('customer-list').innerHTML = mockData.customers.map(c => `<tr><td>#${c.id}</td><td>${c.name}</td><td>${c.phone}</td><td>${c.registered_at}</td></tr>`).join('');
        document.getElementById('order-list').innerHTML = mockData.orders.map(o => `<tr><td>#${o.id}</td><td>${o.customer_name}</td><td>${o.product_name}</td><td>${o.amount.toLocaleString()}đ</td><td><span class="badge badge-success">${o.status}</span></td><td>${o.date}</td></tr>`).join('');
    </script>
</body>
</html>
